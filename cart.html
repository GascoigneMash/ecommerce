<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Cart | NEON PRECISION</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="styles.css">
    
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#D4AF37", "primary-container": "#8A6E1D", "on-primary": "#000000",
              "secondary": "#94A3B8", 
              "surface": "#02040A", "surface-container": "#0A0F1E", "surface-container-highest": "#1E293B",
              "surface-container-lowest": "#000000", "on-surface": "#F3F4F6", "on-surface-variant": "#9CA3AF",
              "outline-variant": "#1E293B", "tertiary": "#38BDF8"
            },
            fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"], "label": ["Inter"] },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
</head>
<body class="font-body selection:bg-primary-container selection:text-on-primary-container">
    <!-- TopNavBar -->
    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-xl shadow-2xl shadow-primary/10 border-b border-white/5">
        <div class="flex justify-between items-center px-8 py-4 max-w-full mx-auto">
            <div class="text-2xl font-black tracking-tighter text-gradient-gold font-headline uppercase">NEON PRECISION</div>
            <div class="hidden md:flex items-center space-x-8 font-headline font-bold uppercase tracking-tighter">
                <a class="text-gray-400 hover:text-primary transition-colors" href="index.html">Home</a>
                <a class="text-gray-400 hover:text-primary transition-colors" href="shopping.html">Shop</a>
            </div>
            <div class="flex items-center space-x-6 text-primary">
                <button class="hover:bg-white/5 transition-all duration-300 p-2 rounded active:scale-95 relative">
                    <span class="material-symbols-outlined">shopping_cart</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-28 pb-20 px-6 max-w-7xl mx-auto">
        <header class="mb-12">
            <h1 class="text-5xl md:text-7xl font-headline font-black tracking-tighter uppercase mb-2">
                Your <span class="text-gradient-gold">Vault</span>
            </h1>
            <p class="text-on-surface-variant font-medium tracking-tight">Review your high-performance selections before final architecting.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
            <!-- Cart Items List (Dynamic) -->
            <div id="cart-items-container" class="lg:col-span-8 space-y-6">
                <!-- Cart Items Injected Here -->
                <div class="text-center text-on-surface-variant py-12">Loading Vault...</div>
            </div>

            <!-- Summary -->
            <aside class="lg:col-span-4 space-y-6">
                <div class="bg-surface-container p-8 rounded-lg shadow-2xl border-t border-white/5">
                    <h2 class="text-2xl font-headline font-black uppercase tracking-tighter mb-8 pb-4 border-b border-white/5">Order Summary</h2>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-on-surface-variant font-medium">
                            <span>Subtotal</span>
                            <span class="text-on-surface" id="summary-subtotal">$0.00</span>
                        </div>
                        <div class="flex justify-between text-on-surface-variant font-medium">
                            <span>Shipping</span>
                            <span class="text-tertiary font-bold tracking-tighter">FREE</span>
                        </div>
                        <div class="flex justify-between text-on-surface-variant font-medium">
                            <span>Tax Analysis (Est)</span>
                            <span class="text-on-surface" id="summary-tax">$0.00</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-baseline mb-8 pt-4 border-t border-white/5">
                        <span class="text-sm font-headline font-bold uppercase tracking-[0.2em] text-on-surface-variant">Total</span>
                        <span id="cart-total" class="text-4xl font-headline font-black text-gradient-gold">$0.00</span>
                    </div>
                    <div class="mb-8">
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">PROMO CODE</label>
                        <div class="flex gap-2">
                            <input class="flex-grow bg-surface-container-lowest border-none focus:ring-1 focus:ring-primary text-sm font-headline tracking-widest placeholder:text-surface-blight rounded-sm border border-white/10" placeholder="ENTER CODE" type="text"/>
                            <button class="bg-surface-bright px-4 py-2 text-xs font-bold uppercase tracking-widest hover:bg-on-surface hover:text-surface transition-colors rounded-sm">APPLY</button>
                        </div>
                    </div>
                    <button onclick="window.location.href='checkout.html'" class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-headline font-black uppercase tracking-tighter py-5 rounded-sm active:scale-[0.98] transition-all duration-200 neon-glow-btn">
                        PROCEED TO CHECKOUT
                    </button>
                    <div class="mt-6 flex flex-col gap-4">
                        <p class="text-[10px] text-center text-on-surface-variant/60 uppercase tracking-widest">SECURE ARCHITECTURED PAYMENT</p>
                        <div class="flex justify-center gap-4 opacity-40">
                            <span class="material-symbols-outlined">credit_card</span>
                            <span class="material-symbols-outlined">account_balance_wallet</span>
                            <span class="material-symbols-outlined">lock</span>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <!-- LOGIC SCRIPT -->
    <script>
        const API_URL = "http://localhost:8000";

        async function loadCart() {
            const container = document.getElementById('cart-items-container');
            const subtotalEl = document.getElementById('summary-subtotal');
            const taxEl = document.getElementById('summary-tax');
            const totalEl = document.getElementById('cart-total');
            
            let subtotal = 0;

            // 1. CHECK IF USER IS LOGGED IN
            const token = localStorage.getItem('neon_token');
            if (!token) {
                container.innerHTML = `
                    <div class="text-center py-12 flex flex-col items-center gap-4 border border-white/5 rounded-sm bg-surface-container p-8">
                        <span class="material-symbols-outlined text-4xl text-gray-600">lock</span>
                        <div>
                            <p class="text-gray-400 font-headline uppercase tracking-widest mb-2">Vault Locked</p>
                            <p class="text-sm text-gray-500 mb-4">You must be authenticated to access your vault.</p>
                            <a href="login.html" class="inline-block px-6 py-2 bg-primary text-black font-bold font-headline uppercase text-xs rounded-sm hover:bg-white transition-colors shadow-[0_0_15px_rgba(212,175,55,0.3)]">
                                Login Now
                            </a>
                        </div>
                    </div>
                `;
                subtotalEl.innerText = "$0.00";
                taxEl.innerText = "$0.00";
                totalEl.innerText = "$0.00";
                return;
            }

            // 2. PREPARE AUTH HEADERS
            const headers = { 
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
            };

            try {
                // 3. FETCH CART ITEMS AND PRODUCTS WITH TOKEN
                const [cartRes, productsRes] = await Promise.all([
                    fetch(`${API_URL}/cart`, { headers: headers }),
                    fetch(`${API_URL}/products`, { headers: headers })
                ]);
                
                const cartItems = await cartRes.json();
                const allProducts = await productsRes.json();

                container.innerHTML = "";

                if (cartItems.length === 0) {
                    container.innerHTML = "<p class='text-center text-gray-500 py-12'>Your Vault is empty.</p><div class='text-center'><a href='shopping.html' class='text-primary hover:underline'>Start Shopping</a></div>";
                    subtotalEl.innerText = "$0.00";
                    taxEl.innerText = "$0.00";
                    totalEl.innerText = "$0.00";
                    return;
                }

                // 4. RENDER ITEMS
                cartItems.forEach(item => {
                    const product = allProducts.find(p => p.id === item.product_id);
                    if (!product) return;

                    const itemTotal = product.price * item.quantity;
                    subtotal += itemTotal;

                    const itemHTML = `
                        <div class="glass-panel p-6 rounded-lg flex flex-col md:flex-row items-center gap-8 group hover:bg-surface-container-highest/40 transition-all duration-300 border border-white/5">
                            <div class="w-32 h-32 flex-shrink-0 bg-surface-container-lowest rounded-sm overflow-hidden p-2">
                                <img alt="${product.name}" class="w-full h-full object-contain mix-blend-lighten" src="${product.image}"/>
                            </div>
                            <div class="flex-grow text-center md:text-left">
                                <span class="text-primary text-[10px] font-bold uppercase tracking-[0.2em] mb-1 block">${product.category}</span>
                                <h3 class="text-xl font-headline font-bold text-on-surface mb-1">${product.name}</h3>
                                <p class="text-on-surface-variant text-sm mb-4">Qty: ${item.quantity}</p>
                                <div class="flex items-center justify-center md:justify-start gap-4">
                                    <button onclick="deleteItem(${item.id})" class="text-red-400/70 hover:text-red-400 transition-colors text-xs flex items-center gap-1 uppercase font-bold tracking-widest">
                                        <span class="material-symbols-outlined text-sm">delete</span> Remove
                                    </button>
                                </div>
                            </div>
                            <div class="flex flex-col items-center md:items-end gap-4 w-full md:w-auto">
                                <div class="text-xl font-headline font-bold text-primary">$${itemTotal.toFixed(2)}</div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += itemHTML;
                });

                // 5. CALCULATE TOTALS
                const tax = subtotal * 0.08; // Example 8% tax
                const total = subtotal + tax;

                subtotalEl.innerText = "$" + subtotal.toFixed(2);
                taxEl.innerText = "$" + tax.toFixed(2);
                totalEl.innerText = "$" + total.toFixed(2);

            } catch (error) {
                console.error("Error loading cart:", error);
                container.innerHTML = "<p class='text-red-400 text-center'>Error loading cart. Check console for details.</p>";
            }
        }

        async function deleteItem(itemId) {
            if(!confirm("Remove this item?")) return;
            
            const token = localStorage.getItem('neon_token');
            
            await fetch(`${API_URL}/cart/${itemId}`, { 
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` } // Send token for delete too
            });
            loadCart(); 
        }

        loadCart();
    </script>
</body>
</html>
